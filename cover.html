<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Cover - Fikih Kepemimpinan Islam</title>
    <style>
        body { background-color: #110d0a; color: #f4efe9; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        .cover-card { border: 3px solid #d4af37; padding: 50px 30px; max-width: 600px; background-color: #1a1510; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 4px; position: relative; }
        .decoration { color: #d4af37; font-size: 40px; margin-bottom: 20px; }
        h1 { font-size: 38px; color: #d4af37; margin-bottom: 10px; font-family: 'Georgia', serif; }
        .subtitle { font-size: 16px; letter-spacing: 1px; color: #e5dac9; margin-bottom: 40px; text-transform: uppercase; font-weight: bold; }
        .details { border-top: 1px solid #4a3b29; padding-top: 20px; margin-top: 40px; font-size: 14px; color: #b5a48c; line-height: 1.8; }
        .badge { background: #3d2f20; color: #d4af37; display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 12px; margin-bottom: 15px; border: 1px solid #d4af37; }
    </style>
</head>
<body>
    <div class="cover-card">
        <div class="decoration">🌙</div>
        <h1>Fikih Kepemimpinan Islam</h1>
        <div class="subtitle">Musyawarah (Syura) dalam Ketatanegaraan Islam<br>Perspektif Hadist Tematik</div>
        
        <div class="details">
            <div class="badge">E-Book Utama</div>
            <p><strong>Author:</strong> Muhammad Panji Islami</p>
            <p><strong>Editor:</strong> Muhamad Iqbal Fisabililah</p>
        </div>
    </div>
</body>
</html>
